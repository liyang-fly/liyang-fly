<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Gitee Pages 测试页</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #dbeafe, transparent 34%), linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
    }
    .card {
      width: min(720px, calc(100vw - 32px));
      padding: 36px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 24px;
      background: rgba(15, 23, 42, .72);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #22c55e22;
      color: #86efac;
      border: 1px solid #22c55e66;
      font-size: 14px;
    }
    h1 { margin: 18px 0 12px; font-size: clamp(30px, 5vw, 48px); line-height: 1.1; }
    p { color: #cbd5e1; line-height: 1.8; font-size: 17px; }
    code { background: rgba(148,163,184,.18); padding: 2px 7px; border-radius: 8px; }
    .meta { margin-top: 24px; font-size: 14px; color: #94a3b8; }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">GitHub Pages 部署测试</span>
    <h1>上传成功 🎉</h1>
    <p>如果你能在 GitHub Pages 外网链接中看到这个页面，说明 Hermes 已经可以把 HTML 文件推送到 <code>master</code> 分支并用于网页预览。</p>
    <p>后续「每周事件前瞻回顾」任务会生成完整 HTML 报告，Telegram 只发送简版摘要和报告链接。</p>
    <div class="meta">Generated by Hermes Agent · 2026-06-07 · GitHub Pages test</div>
  </main>
</body>
</html>
