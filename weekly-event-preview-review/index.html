<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>每周事件前瞻回顾｜Hermes Reports</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;color:#0f172a;line-height:1.7}
    header{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:white;padding:56px 20px}
    main{max-width:960px;margin:0 auto;padding:28px 20px 56px}
    .card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    h1{max-width:960px;margin:0 auto;font-size:clamp(28px,5vw,46px)}
    .sub{max-width:960px;margin:12px auto 0;color:#dbeafe;font-size:17px}
    a{color:#1d4ed8;text-decoration:none}a:hover{text-decoration:underline}
    .empty{color:#64748b}.meta{margin-top:18px;color:#64748b;font-size:14px}
  </style>
</head>
<body>
  <header>
    <h1>每周事件前瞻回顾</h1>
    <p class="sub">由 Hermes Agent 自动生成的 A股/宏观/政策事件回顾与前瞻 HTML 报告索引。</p>
  </header>
  <main>
    <section class="card">
      <h2>报告列表</h2>
      <p class="empty">暂无正式报告。下一次任务运行后会自动出现在这里。</p>
      <div class="meta">目录：weekly-event-preview-review/reports/</div>
    </section>
  </main>
</body>
</html>
